<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZALTV Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#020617;
    color:white;
    text-align:center;
}

/* HERO */
.hero {
    padding:80px 20px;
}

.hero h1 {
    font-size:40px;
    color:#22c55e;
}

.hero p {
    margin:10px 0 20px;
}

/* BUTTON */
.btn {
    background:#22c55e;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

/* PRICING */
.pricing {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:30px;
}

.card {
    background:#0f172a;
    margin:10px;
    padding:20px;
    border-radius:10px;
    width:220px;
}

.price {
    color:#22c55e;
    font-size:22px;
}

/* FOOTER */
footer {
    margin-top:40px;
    padding:20px;
    background:#020617;
}
</style>

</head>

<body>

<div class="hero">
    <h1>ZALTV PREMIUM IPTV</h1>
    <p>Streaming TV, Movie, Sport Tanpa Buffer 🔥</p>
    <button class="btn" onclick="order()">Order via WhatsApp</button>
</div>

<div class="pricing">

    <div class="card">
        <h3>1 Bulan</h3>
        <p class="price">Rp 35K</p>
    </div>

    <div class="card">
        <h3>3 Bulan</h3>
        <p class="price">Rp 95K</p>
    </div>

    <div class="card">
        <h3>6 Bulan</h3>
        <p class="price">Rp 150K</p>
    </div>

    <div class="card">
        <h3>1 Tahun</h3>
        <p class="price">Rp 280K</p>
    </div>

</div>

<footer>
    <p>© 2026 ZALTV</p>
</footer>

<script>
function order(){
    window.location.href="https://wa.me/6285398956995";
}
</script>

</body>
</html>
