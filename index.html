<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard ZALTV</title>

<style>
body {
    background:#000;
    color:white;
    font-family:sans-serif;
}

.nav {
    padding:20px;
    background:#111;
    display:flex;
    justify-content:space-between;
}

.btn {
    background:red;
    padding:8px;
    cursor:pointer;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    padding:20px;
}

.card {
    width:200px;
    margin:10px;
    cursor:pointer;
}

.card img {
    width:100%;
}
</style>
</head>

<body>

<div class="nav">
    <h2>ZALTV DASHBOARD</h2>
    <div class="btn" onclick="logout()">Logout</div>
</div>

<div class="grid">
    <div class="card" onclick="play()">
        <img src="https://via.placeholder.com/200x300">
        <p>Channel 1</p>
    </div>
</div>

<script>
if(localStorage.getItem("login") !== "true"){
    window.location.href="index.html";
}

function logout(){
    localStorage.removeItem("login");
    window.location.href="index.html";
}

function play(){
    window.location.href="player.html";
}
</script>

</body>
</html>
